suite: Test Deployment template command and args rendering
templates:
  - templates/deployment.yaml
values:
  - command_args_values.yaml
release:
  namespace: test-namespace
tests:
  - it: should render command and args when provided
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /bin/sh
            - -c
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - echo test
