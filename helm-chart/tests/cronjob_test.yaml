suite: Test Cronjob template with CI Values
templates:
  - templates/cronjob.yaml
values:
  - ../ci-values.yaml
release:
  namespace: test-namespace
tests:
  - it: should render cronjob with values from ci-values.yaml
    asserts:
      - isKind:
          of: CronJob

      # ─────────────── metadata ───────────────
      - equal:
          path: metadata.name
          value: test-cronjob
      - equal:
          path: metadata.namespace
          value: test-namespace

      # ─────────────── cronjob specs ───────────────
      - equal:
          path: spec.schedule
          value: "*/5 * * * *"

      # ─────────────── template labels ───────────────
      - isNotEmpty:
          path: spec.jobTemplate.spec.template.metadata.labels

      # ─────────────── container.image ───────────────
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "docker.io/test-image:v1.3.0"
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].name
          value: container-1

      # ─────────────── command ───────────────
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[0]
          value: /bin/sh
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[1]
          value: -c
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args[0]
          value: date; echo "Hello from container one"

      # ─────────────── resources ───────────────
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
          value: "50m"
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: "32Mi"
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: "10m"
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: "16Mi"
