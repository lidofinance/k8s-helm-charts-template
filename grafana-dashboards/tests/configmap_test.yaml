suite: Test Grafana dashboard configmap template with CI values
templates:
  - templates/configmap.yaml
values:
  - ../ci-values.yaml
release:
  name: test-grafana-dashboards
  namespace: team-test
tests:
  - it: should not render configmaps when dashboards are not configured
    set:
      dashboards: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a Grafana dashboard configmap with defaults
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: grafana-dashboard-example-dashboard
      - equal:
          path: metadata.namespace
          value: team-test
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
      - equal:
          path: metadata.labels["app.kubernetes.io/team"]
          value: test-team
      - equal:
          path: metadata.annotations.grafana_folder
          value: Custom
      - equal:
          path: metadata.annotations["lido.fi/maintainer"]
          value: Test Team <test@lido.fi>
      - exists:
          path: data["example-dashboard.json"]
